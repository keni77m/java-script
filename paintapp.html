<head>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
</head>
<body class="bg-warning">
  <div class="d-flex justify-content-center flex-column align-items-center">
    <h1>keni's app</h1>
    <div>
      <button
        class="bg-success w-5 p-3 rounded-circle"
        id="green btn"
      ></button>
      <button class="bg-info w-5 p-3 rounded-circle" id="blue btn"></button>.
      <button class="bg-danger w-5 p-3 rounded-circle" id="red btn"></button>
      <button
        style="background: brown"
        class="bg- w-5 p-3 rounded-circle"
        id="brown btn"
      ></button>
      <button class="bg-light w-5 p-3 rounded-circle" id="white btn"></button>.
      <button
        class="bg-warning w-5 p-3 rounded-circle"
        id="yellow btn"
      ></button>
    </div>
    <input id="brushsize" type="number" />
    <p>colour white is the eraser or rubber</p>

    <br />
    <canvas
      id="canvas"
      class="border border-info"
      width="800"
      height="600"
    ></canvas>
  </div>
</body>
<script>
  //grab the input
  let input = document.getElementById("brushsize");
  input.addEventListener("input", triggerbrushsize);
  //grab the success button
  let greenbti = document.getElementById("green btn");
  greenbti.addEventListener("click", triggergreen);
  //grab the blue button
  let bluebti = document.getElementById("blue btn");
  bluebti.addEventListener("click", triggerblue);
  let redbti = document.getElementById("red btn");
  redbti.addEventListener("click", triggerred);
  let yellowbti = document.getElementById("yellow btn");
  yellowbti.addEventListener("click", triggeryellow);
  let whitebti = document.getElementById("white btn");
  whitebti.addEventListener("click", triggerwhite);
  //grab the

  let brownbti = document.getElementById("brown btn");
  brownbti.addEventListener("click", triggerbrown);
  //grab the canvas
  let canvas = document.getElementById("canvas");
  let brush = canvas.getContext("2d");
  brush.fillStyle = "white";
  brush.fillRect(0, 0, 800, 600);
  let isdrawing = false;
  brush.stroke();
  canvas.addEventListener("mousedown", triggerdown);
  canvas.addEventListener("mouseup", triggerup);
  canvas.addEventListener("mouseleave", triggerleave);
  canvas.addEventListener("mousemove", triggermove);
  function triggerup() {
    isdrawing = false;
  }

  function triggermove(mouse) {
    console.log("moving inside canvas");
    //draw line to the mouse
    if (isdrawing == true) {
      brush.lineTo(mouse.offsetX, mouse.offsetY);
      brush.stroke();
    }
  }
  function triggerdown(mouse) {
    console.log("mouse entered the canvas");
    //move brush to mouse
    brush.moveTo(mouse.offsetX, mouse.offsetY);
    brush.beginPath();
    isdrawing = true;
  }
  function triggerleave(mouse) {
    console.log("mouse left the canvas");
  }
  function triggergreen() {
    brush.strokeStyle = "green";
  }
  function triggerblue() {
    brush.strokeStyle = "blue";
  }
  function triggerred() {
    brush.strokeStyle = "red";
  }
  function triggeryellow() {
    brush.strokeStyle = "yellow";
  }
  function triggerbrushsize() {
    brush.lineWidth = input.value;
  }
  function triggerbrown() {
    brush.strokeStyle = "brown";
  }
  function triggerwhite() {
    brush.strokeStyle = "white";
  }
</script>
