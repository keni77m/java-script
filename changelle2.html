<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column align-items-center">
  <h1>the magic crystal ball</h1>
  <p id="my paragraph">click to see your future</p>
  <button id="fortune btn">tell my fortune!</button>
  <script>
    let fortune = document.getElementById("fortune btn");
    fortune.addEventListener("click", triggerfortune);
    function triggerfortune() {
      let p = document.getElementById("my paragraph");
      p.innerText = "hello";
      let sentences = [
        "tommorow you will play football",
        "you will spill some milk today",
        "you will fall today",
        "marshmellows are flying",
        "ronaldo and messi are the real goats",
        "idk was going to happen on the next 36 days",
        "some people are crazy",
        "oh some nice food",
        "your childhood was deadly",
      ];
      p.innerText = sentences[Math.floor(Math.random() * 9)];
    }
  </script>
</body>
