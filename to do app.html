    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
</head>

<body class="bg-info d-flex align-items-center justify-content-center">
  <div id="box" style="width: 300px; height: 250" class="bg-light rounded-4">
    <h1>my to do app</h1>
    <input id="my input" />
    <button onclick="sayhello()" class="bg-success">add</button>
  </div>
</body>
<script>
  console.log("hello");
  function sayhello() {
    console.log("button pressed");
    //grab the input
    let input = document.getElementById("my input");
    console.log(input.value);
    //grab the box
    let box = document.getElementById("box");
    box.insertAdjacentHTML("beforeend","<p>"+input.value+"</p>")
  }
</script>
