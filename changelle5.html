<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column align-items-center">
    <button id="grow btn">ZAP!GROW</button>
    <button id="shrink btn">ZAP!SHRINK</button>
    <h1 id="zap btn">🦖</h1>
    <script>
        let size=10
        let grow = document.getElementById("grow btn")
        grow.addEventListener("click",triggergrow)
        let shrink = document.getElementById("shrink btn")
        shrink.addEventListener("click",triggershrink)
        function triggergrow()
        {
       let h1= document.getElementById("zap btn")
        size+=5
        h1.style.fontSize=size+"px"
        }
        function triggershrink()
        {
            let h1= document.getElementById("zap btn")
            size-=5
            h1.style.fontSize=size+"px"
        }
    </script>
</body>
