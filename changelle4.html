<body class="d-flex flex-column align-items-center">
    
  <h1 id="my number">cookies:0</h1>

let cookies = document.getElementById("cookie btn")
cookies.addEventListener("click",triggercookies)
function triggercookies()
{
number+=1
 let h1=document.getElementById("my number")
 h1.innerText=number
console.log(number)
}
</script>
